<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portfolio Chat (dev client)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <span class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          Matheus's Portfolio Assistant
        </span>
        <p class="tagline">
          Ask about experience, skills, and projects — answers are grounded in a
          real knowledge base, not guesses.
        </p>
      </header>

      <section class="panel" aria-label="Chat">
        <div id="messages" class="messages" aria-live="polite">
          <p class="empty-state">
            Try “What are his strongest backend skills?” or “Tell me about a
            technically difficult project.”
          </p>
        </div>

        <form id="chat-form" class="composer">
          <input
            id="chat-input"
            class="composer-input"
            type="text"
            placeholder="Ask about Matheus..."
            autocomplete="off"
            autofocus
          />
          <button id="chat-send" class="composer-send" type="submit" aria-label="Send">
            <svg
              width="16"
              height="16"
              viewBox="0 0 16 16"
              fill="none"
              aria-hidden="true"
            >
              <path
                d="M8 13V3M8 3L3.5 7.5M8 3L12.5 7.5"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </form>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
