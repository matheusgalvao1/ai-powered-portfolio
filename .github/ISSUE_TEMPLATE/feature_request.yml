name: Feature request
description: Propose a new feature or improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - apps/api
        - apps/web
        - packages/shared
        - packages/config
        - scripts/sync-notion
        - knowledge base
        - infrastructure
        - other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What's missing or frustrating today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
