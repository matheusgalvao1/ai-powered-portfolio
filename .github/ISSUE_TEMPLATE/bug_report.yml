name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - apps/api
        - apps/web
        - packages/shared
        - packages/config
        - scripts/sync-notion
        - knowledge base
        - other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `pnpm dev`
        2. Send message "..."
        3. See error
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      render: shell
    validations:
      required: false

  - type: input
    id: node-version
    attributes:
      label: Node version
      placeholder: node --version
    validations:
      required: false
